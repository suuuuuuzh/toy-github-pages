name: Rebuild film calendar.ics

# 只要 data.js 变了,就自动重新生成 calendar.ics 并提交回来
on:
  push:
    paths:
      - "film-timeline/data.js"
      - "film-timeline/build-ics.cjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate calendar.ics
        run: node film-timeline/build-ics.cjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain film-timeline/calendar.ics)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add film-timeline/calendar.ics
            git commit -m "chore: rebuild calendar.ics from data.js"
            git push
          else
            echo "calendar.ics 无变化,跳过提交"
          fi
