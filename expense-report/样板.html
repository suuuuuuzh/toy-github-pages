<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>费用报销明细 · 《竹林遗录》</title><style>
:root {
  --color-primary: #2563eb;
  --color-invoice: #16a34a;
  --color-tpiao: #d97706;
  --color-none: #dc2626;
  --color-border: #e2e8f0;
  --color-bg: #f8fafc;
  --color-text: #1e293b;
  --color-muted: #64748b;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

header {
  border-bottom: 2px solid var(--color-primary);
  padding-bottom: 16px;
  margin-bottom: 24px;
}

header h1 {
  margin: 0 0 12px;
  font-size: 26px;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 28px;
  color: var(--color-muted);
  font-size: 14px;
}

.meta b {
  color: var(--color-text);
}

.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.card {
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 16px 18px;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
}

.card .label {
  font-size: 13px;
  color: var(--color-muted);
  margin-bottom: 6px;
}

.card .value {
  font-size: 22px;
  font-weight: 600;
}

.card .sub {
  font-size: 12px;
  color: var(--color-muted);
  margin-top: 4px;
}

.card.total .value { color: var(--color-primary); }
.card.invoice .value { color: var(--color-invoice); }
.card.tpiao .value { color: var(--color-tpiao); }
.card.none .value { color: var(--color-none); }

section {
  margin-bottom: 36px;
}

section h2 {
  font-size: 18px;
  margin-bottom: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  overflow: hidden;
  font-size: 14px;
}

th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--color-border);
  text-align: left;
  vertical-align: middle;
}

th {
  background: #f1f5f9;
  font-weight: 600;
  color: var(--color-muted);
}

tbody tr:last-child td {
  border-bottom: none;
}

tbody tr.row-none {
  background: #fef2f2;
}

tfoot td {
  font-weight: 700;
  background: #f8fafc;
}

.amount-cell {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
}

.badge-invoice { background: var(--color-invoice); }
.badge-tpiao { background: var(--color-tpiao); }
.badge-none { background: var(--color-none); }

.btn {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  background: var(--color-primary);
  color: #fff;
  text-decoration: none;
  font-size: 13px;
  white-space: nowrap;
}

.btn:hover {
  opacity: 0.85;
}

.btn.disabled {
  background: #cbd5e1;
  pointer-events: none;
}

.muted {
  color: var(--color-muted);
}

.empty-hint {
  color: var(--color-muted);
  font-size: 14px;
  padding: 8px 0;
}

@media print {
  body {
    background: #fff;
  }
  .btn {
    display: none;
  }
}

/* 明细表头部：标题 + 筛选/导出 */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 6px;
}
.section-head h2 { margin: 0; }
.section-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

/* 筛选视图按钮 */
.filter-bar {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  border: 1px solid var(--color-border);
  background: #fff;
  color: var(--color-text);
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
}
.filter-btn:hover { border-color: var(--color-primary); }
.filter-btn.active {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #fff;
}
.filter-btn .cnt {
  opacity: 0.7;
  font-variant-numeric: tabular-nums;
}

.btn-outline {
  border: 1px solid var(--color-primary);
  background: #fff;
  color: var(--color-primary);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 13px;
  cursor: pointer;
}
.btn-outline:hover { background: #eff6ff; }

/* 可编辑备注 */
.remark-cell { min-width: 160px; }
.remark-input {
  width: 100%;
  min-width: 140px;
  border: 1px solid var(--color-border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 13px;
  font-family: inherit;
  background: #fffef8;
}
.remark-input:focus {
  outline: none;
  border-color: var(--color-primary);
  background: #fff;
}

/* 发票单元格：已挂发票 chip + 挂发票按钮 */
.inv-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.inv-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 6px;
  padding: 2px 6px; font-size: 12px; max-width: 220px;
}
.inv-chip a { color: var(--color-invoice); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inv-chip .detach-btn {
  border: none; background: transparent; color: var(--color-muted);
  cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
}
.inv-chip .detach-btn:hover { color: var(--color-none); }

/* 挂发票弹窗 */
.picker-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.45);
  display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
}
.picker-box {
  background: #fff; border-radius: 12px; width: min(560px, 100%);
  max-height: 80vh; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.picker-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-bottom: 1px solid var(--color-border); font-size: 14px;
}
.picker-close { border: none; background: transparent; font-size: 22px; cursor: pointer; color: var(--color-muted); }
.picker-search {
  margin: 12px 16px; padding: 8px 12px; border: 1px solid var(--color-border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
}
.picker-list { overflow-y: auto; padding: 0 16px 16px; }
.pick-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--color-border);
}
.pick-info { flex: 1; font-size: 13px; }
.pick-near {
  background: var(--color-invoice); color: #fff; border-radius: 999px;
  padding: 1px 8px; font-size: 11px; margin-left: 6px;
}
.pick-add[disabled] { background: #cbd5e1; pointer-events: none; }

.picker-tools { display: flex; gap: 8px; align-items: center; margin: 12px 16px 6px; }
.picker-tools .picker-search { margin: 0; flex: 1; }
.upload-lbl { cursor: pointer; white-space: nowrap; }
.picker-hint { padding: 0 16px; font-size: 12px; min-height: 16px; }

/* 可编辑单元格 */
.desc-input, .date-input, .amt-input, .cat-input {
  width: 100%;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 4px 6px;
  font-size: 13px;
  font-family: inherit;
  background: #fffef8;
}
.desc-input { min-width: 180px; font-weight: 500; }
.amt-input { text-align: right; font-variant-numeric: tabular-nums; }
.date-input { min-width: 96px; }
.cat-input { background: #fff; border-color: var(--color-border); }
.desc-input:hover, .date-input:hover, .amt-input:hover { border-color: var(--color-border); }
.desc-input:focus, .date-input:focus, .amt-input:focus, .cat-input:focus {
  outline: none; border-color: var(--color-primary); background: #fff;
}

/* 借款输入 */
.loan-input { width: 90px; border: 1px solid var(--color-border); border-radius: 6px; padding: 2px 6px; font-size: 14px; font-family: inherit; text-align: right; }
.loan-input:focus { outline: none; border-color: var(--color-primary); }

/* 发票内容 / 发票金额输入 */
.invcat-input, .invamt-input { width: 100%; min-width: 72px; border: 1px solid transparent; border-radius: 6px; padding: 4px 6px; font-size: 13px; font-family: inherit; background: #fffef8; }
.invamt-input { text-align: right; font-variant-numeric: tabular-nums; }
.invcat-input:hover, .invamt-input:hover { border-color: var(--color-border); }
.invcat-input:focus, .invamt-input:focus { outline: none; border-color: var(--color-primary); background: #fff; }

/* 类目手风琴 */
#category-accordion { display: flex; flex-direction: column; gap: 8px; }
.cat-group { border: 1px solid var(--color-border); border-radius: 10px; overflow: hidden; background: #fff; }
.cat-head { width: 100%; display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #fff; border: none; cursor: pointer; font-size: 15px; text-align: left; }
.cat-head:hover { background: #f8fafc; }
.cat-head.open { background: #f1f5f9; border-bottom: 1px solid var(--color-border); }
.cat-caret { color: var(--color-muted); width: 14px; }
.cat-name { font-weight: 600; flex: 1; }
.cat-meta { color: var(--color-muted); font-size: 13px; font-variant-numeric: tabular-nums; }
.cat-panel { padding: 8px 12px 14px; }
.cat-panel table { font-size: 13px; }
.cat-grand { text-align: right; font-weight: 700; padding: 8px 16px 0; font-variant-numeric: tabular-nums; }

/* 付款截图徽章 */
.badge-shot { background: #64748b; }
/* 凭证 chip 类型标签 */
.chip-tag { display:inline-block; font-size:10px; padding:0 5px; border-radius:4px; color:#fff; margin-right:3px; }
.tag-dipiao { background: var(--color-tpiao); }
.tag-shot { background: #64748b; }
.inv-chip.chip-dipiao { background:#fff7ed; border-color:#fed7aa; }
.inv-chip.chip-dipiao a { color: var(--color-tpiao); }
.inv-chip.chip-shot { background:#f1f5f9; border-color:#cbd5e1; }
.inv-chip.chip-shot a { color:#475569; }
.upload-lbl { font-size:12px; }

/* 主表内的类目分隔行 */
tr.cat-row td { background: #eef2ff; font-weight: 700; padding: 8px 12px; border-top: 2px solid #c7d2fe; }
.cat-row-name { color: var(--color-primary); font-size: 14px; }
.cat-row-meta { color: var(--color-muted); font-weight: 500; font-size: 12px; margin-left: 10px; font-variant-numeric: tabular-nums; }

/* 抵票 on/off 开关 */
.dipiao-toggle { border: 1px solid var(--color-tpiao); background: #fff; color: var(--color-tpiao); border-radius: 999px; padding: 3px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.dipiao-toggle.on { background: var(--color-tpiao); color: #fff; }

/* 发票悬停预览 */
#inv-preview { position: fixed; z-index: 200; width: 300px; height: 320px; background: #fff; border: 1px solid var(--color-border); border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); overflow: hidden; pointer-events: none; }
#inv-preview img { width: 100%; height: 100%; object-fit: contain; background: #f8fafc; }
#inv-preview iframe { width: 100%; height: 100%; border: 0; }
#inv-preview .prev-none { padding: 20px; font-size: 13px; color: var(--color-muted); }

/* 序号列：合并勾选/操作 */
.num-cell { display: flex; align-items: center; gap: 6px; }
.merge-cb { width: 15px; height: 15px; cursor: pointer; }
.row-op { border: 1px solid var(--color-border); background: #fff; border-radius: 5px; font-size: 11px; padding: 1px 6px; cursor: pointer; color: var(--color-muted); }
.row-op:hover { border-color: var(--color-primary); color: var(--color-primary); }
tr:has(.unmerge-btn) td { background: #f5f3ff; }

/* 行上下移动 */
.move-btns { display: inline-flex; flex-direction: column; line-height: 1; }
.move-btns button { border: none; background: transparent; color: var(--color-muted); cursor: pointer; font-size: 9px; padding: 0; height: 10px; }
.move-btns button:hover { color: var(--color-primary); }

/* 删除单行按钮 */
.del-row-btn { border: none; background: transparent; color: #cbd5e1; cursor: pointer; font-size: 13px; padding: 0 2px; line-height: 1; }
.del-row-btn:hover { color: var(--color-none); }

.tabs{display:flex;gap:8px;margin:0 0 20px;flex-wrap:wrap}
.tab{border:1px solid var(--color-border);background:#fff;border-radius:8px;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--color-muted)}
.tab.active{background:var(--color-primary);border-color:var(--color-primary);color:#fff}
.note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:18px}
</style></head><body><div class="container">

function dl(it){const fs=it.files||[];if(!fs.length)return '<span class="muted">—</span>';return fs.map(f=>{const m=meta(f);const lab=m?(m.merchant||"发票"):f.split("/").pop();return `<a class="btn" href="${esc(f)}" download="${esc(dlname(it,f))}" target="_blank" rel="noopener">${esc(lab).slice(0,12)}</a>`;}).join(" ");}
function rowH(it){return `<tr class="${has(it)?"":"row-none"}"><td>${it.id}</td><td>${esc(it.category)}</td><td>${esc(it.description||"-")}</td><td>${esc(it.date)}</td><td class="amount-cell">${fmt(it.amount)}</td><td>${badge(it)}</td><td>${dl(it)}</td><td>${esc(it.invoiceCategory||"-")}</td><td class="amount-cell">${it.invoiceAmount!==""&&it.invoiceAmount!=null?fmt(it.invoiceAmount):"-"}</td><td>${esc(it.remark||"")||'<span class="muted">—</span>'}</td></tr>`;}
const HEAD=`<thead><tr><th>序号</th><th>类目</th><th>说明</th><th>日期</th><th>金额（元）</th><th>凭证</th><th>发票</th><th>发票内容</th><th>发票金额</th><th>备注</th></tr></thead>`;
function renderTabs(){document.getElementById("tabs").innerHTML=DATA.reports.map((r,i)=>`<button class="tab${i===ri?' active':''}" data-i="${i}">${esc(r.info.reportTitle)}<br><span style="font-weight:400;font-size:12px;opacity:.85">${esc(r.info.period)} · ${r.items.length}笔</span></button>`).join("");document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{ri=+b.dataset.i;filter="all";exp.clear();renderAll();});}
function renderMeta(){const f=rep().info;document.getElementById("rt").textContent=f.reportTitle;document.getElementById("meta").innerHTML=`<span>公司：<b>${esc(f.company)}</b></span><span>报销人：<b>${esc(f.submitter)}</b></span><span>项目名称：<b>${esc(f.project)}</b></span><span>报销周期：<b>${esc(f.period)}</b></span><span>借款金额：<b>¥${fmt(f.loan)}</b></span>`;}
function renderCards(){const its=items();const inv=its.filter(has),none=its.filter(i=>!has(i));const sum=a=>a.reduce((s,i)=>s+i.amount,0);const cards=[["total","报销总金额",sum(its),its.length],["invoice","有发票金额",sum(inv),inv.length],["none","无发票金额",sum(none),none.length]];document.getElementById("cards").innerHTML=cards.map(c=>`<div class="card ${c[0]}"><div class="label">${c[1]}</div><div class="value">${fmt(c[2])} 元</div><div class="sub">共 ${c[3]} 笔</div></div>`).join("");const z=rep().zip;document.getElementById("dlall").innerHTML=z?`<a class="btn" href="${esc(z)}" download>⬇ 一键下载所有发票（${(rep().invoices||[]).length} 张，zip）</a>`:"";}
function renderFilter(){const its=items();const cnt={all:its.length,invoice:its.filter(has).length,none:its.filter(i=>!has(i)).length};const defs=[["all","全部"],["invoice","有发票"],["none","无发票"]];document.getElementById("fb").innerHTML=defs.map(d=>`<button class="filter-btn${filter===d[0]?' active':''}" data-f="${d[0]}">${d[1]} <span class="cnt">${cnt[d[0]]}</span></button>`).join("");document.querySelectorAll(".filter-btn").forEach(b=>b.onclick=()=>{filter=b.dataset.f;renderFilter();renderTbl();});}
function renderTbl(){const rows=items().filter(i=>filter==="all"||(filter==="invoice"?has(i):!has(i)));const tot=rows.reduce((s,i)=>s+i.amount,0);document.getElementById("tbl").innerHTML=HEAD+"<tbody>"+rows.map(rowH).join("")+"</tbody>"+`<tfoot><tr><td colspan="4">${filter==="all"?"合计":"视图合计"}（${rows.length}笔）</td><td class="amount-cell">${fmt(tot)} 元</td><td colspan="5"></td></tr></tfoot>`;}
function renderAcc(){const opts=["交通费","住宿费","餐费","汽车费用","快递费","办公用品","器材","业务招待费","其他"];const its=items();const seen=new Set();const order=[];opts.forEach(c=>{seen.add(c);order.push(c);});its.forEach(i=>{if(!seen.has(i.category)){seen.add(i.category);order.push(i.category);}});const gs=order.map(c=>({c,it:its.filter(i=>i.category===c)})).filter(g=>g.it.length);const grand=gs.reduce((s,g)=>s+g.it.reduce((a,i)=>a+i.amount,0),0);document.getElementById("acc").innerHTML=gs.map(g=>{const sum=g.it.reduce((a,i)=>a+i.amount,0);const o=exp.has(g.c);return `<div class="cat-group"><button class="cat-head${o?' open':''}" data-c="${esc(g.c)}"><span class="cat-caret">${o?'▾':'▸'}</span><span class="cat-name">${esc(g.c)}</span><span class="cat-meta">${g.it.length} 笔 · ¥${fmt(sum)}</span></button>${o?`<div class="cat-panel"><div style="overflow-x:auto"><table>${HEAD}<tbody>${g.it.map(rowH).join("")}</tbody></table></div></div>`:""}</div>`;}).join("")+`<div class="cat-grand">合计：¥${fmt(grand)}（${its.length} 笔）</div>`;document.querySelectorAll(".cat-head").forEach(b=>b.onclick=()=>{const c=b.dataset.c;exp.has(c)?exp.delete(c):exp.add(c);renderAcc();});}
function renderInvList(){const inv=rep().invoices||[];const box=document.getElementById("invlist");if(!inv.length){box.innerHTML="";return;}const rows=inv.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(v=>`<tr><td>${esc(v.date||"-")}</td><td>${esc(v.merchant||"-")}</td><td>${esc(v.kind||"-")}</td><td class="amount-cell">${v.amount!=null?fmt(v.amount):"-"}</td><td><a class="btn" href="${esc(v.file)}" download target="_blank" rel="noopener">下载</a></td></tr>`).join("");box.innerHTML=`<h2>发票清单（已托管 ${inv.length} 张）</h2><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>商户/用途</th><th>类型</th><th>金额（元）</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
function renderAll(){renderTabs();renderMeta();renderCards();renderFilter();renderTbl();renderAcc();renderInvList();}
renderAll();
</script></body></html>
