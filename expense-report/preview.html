<style>
:root {

}

* {

}

body {
  margin: 0;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--color-bg);

  line-height: 1.5;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

header {
  border-bottom: 2px solid var(--color-primary);
  padding-bottom: 16px;
  margin-bottom: 24px;
}

header h1 {
  margin: 0 0 12px;
  font-size: 26px;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 28px;
  color: var(--color-muted);
  font-size: 14px;
}

.meta b {
  color: var(--color-text);
}

.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.card {
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 16px 18px;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
}

.card .label {
  font-size: 13px;
  color: var(--color-muted);
  margin-bottom: 6px;
}

.card .value {
  font-size: 22px;
  font-weight: 600;
}

.card .sub {
  font-size: 12px;
  color: var(--color-muted);
  margin-top: 4px;
}

.card.total .value { color: var(--color-primary); }
.card.invoice .value { color: var(--color-invoice); }
.card.tpiao .value { color: var(--color-tpiao); }
.card.none .value { color: var(--color-none); }

section {
  margin-bottom: 36px;
}

section h2 {
  font-size: 18px;
  margin-bottom: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  overflow: hidden;
  font-size: 14px;
}

th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--color-border);
  text-align: left;
  vertical-align: middle;
}

th {
  background: #f1f5f9;
  font-weight: 600;
  color: var(--color-muted);
}

tbody tr:last-child td {
  border-bottom: none;
}

tbody tr.row-none {
  background: #fef2f2;
}

tfoot td {
  font-weight: 700;
  background: #f8fafc;
}

.amount-cell {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
}

.badge-invoice { background: var(--color-invoice); }
.badge-tpiao { background: var(--color-tpiao); }
.badge-none { background: var(--color-none); }

.btn {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  background: var(--color-primary);
  color: #fff;
  text-decoration: none;
  font-size: 13px;
  white-space: nowrap;
}

.btn:hover {
  opacity: 0.85;
}

.btn.disabled {
  background: #cbd5e1;
  pointer-events: none;
}

.muted {
  color: var(--color-muted);
}

.empty-hint {
  color: var(--color-muted);
  font-size: 14px;
  padding: 8px 0;
}

@media print {
  body {
    background: #fff;
  }
  .btn {
    display: none;
  }
}

/* 明细表头部：标题 + 筛选/导出 */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 6px;
}
.section-head h2 { margin: 0; }
.section-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

/* 筛选视图按钮 */
.filter-bar {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  border: 1px solid var(--color-border);
  background: #fff;
  color: var(--color-text);
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
}
.filter-btn:hover { border-color: var(--color-primary); }
.filter-btn.active {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #fff;
}
.filter-btn .cnt {
  opacity: 0.7;
  font-variant-numeric: tabular-nums;
}

.btn-outline {
  border: 1px solid var(--color-primary);

  color: var(--color-primary);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 13px;
  cursor: pointer;
}
.btn-outline:hover { background: #eff6ff; }

/* 可编辑备注 */
.remark-cell { min-width: 160px; }
.remark-input {

  padding: 4px 8px;
  font-size: 13px;
  font-family: inherit;
  background: #fffef8;
}
.remark-input:focus {

  border-color: var(--color-primary);

}

.tabs{display:flex;gap:8px;margin:0 0 20px;flex-wrap:wrap}
.tab{border:1px solid var(--color-border);background:#fff;border-radius:8px;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--color-muted)}
.tab.active{background:var(--color-primary);border-color:var(--color-primary);color:#fff}
.note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:18px}
tr.personal td{background:#fffbeb}
</style></head>

let ri=0, filter="all";
const fmt=n=>Number(n||0).toLocaleString("zh-CN",{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function rep(){return DATA.reports[ri];}
function items(){return rep().items;}
function badge(t){return t==="invoice"?'<span class="badge badge-invoice">发票</span>':t==="tpiao"?'<span class="badge badge-tpiao">替票</span>':'<span class="badge badge-none">无凭证</span>';}
function isPersonal(it){return (it.description+' '+(it.remark||'')).includes('私人');}
function dl(it){return it.invoiceFile?`<a class="btn" href="${esc(it.invoiceFile)}" download target="_blank" rel="noopener">下载</a>`:(it.voucherType==="invoice"?'<span class="muted">待上传</span>':'<span class="muted">—</span>');}
function renderTabs(){
  document.getElementById("tabs").innerHTML=DATA.reports.map((r,i)=>`<button class="tab${i===ri?' active':''}" data-i="${i}">${esc(r.title)}<br><span style="font-weight:400;font-size:12px;opacity:.85">${esc(r.period)} · ${r.items.length}笔</span></button>`).join("");
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{ri=+b.dataset.i;filter="all";renderAll();});
}
function renderCards(){
  const its=items();const inv=its.filter(i=>i.voucherType==="invoice"),none=its.filter(i=>i.voucherType==="none");
  const sum=a=>a.reduce((s,i)=>s+i.amount,0);
  const cards=[["total","报销总金额",sum(its),its.length],["invoice","有发票金额",sum(inv),inv.length],["none","无发票金额",sum(none),none.length]];
  document.getElementById("summary-cards").innerHTML=cards.map(c=>`<div class="card ${c[0]}"><div class="label">${c[1]}</div><div class="value">${fmt(c[2])} 元</div><div class="sub">共 ${c[3]} 笔</div></div>`).join("");
}
function renderFilter(){
  const its=items();const cnt={all:its.length,invoice:its.filter(i=>i.voucherType==="invoice").length,none:its.filter(i=>i.voucherType==="none").length};
  const defs=[["all","全部"],["invoice","有发票"],["none","无发票"]];
  document.getElementById("filter-bar").innerHTML=defs.map(d=>`<button class="filter-btn${filter===d[0]?' active':''}" data-f="${d[0]}">${d[1]} <span class="cnt">${cnt[d[0]]}</span></button>`).join("");
  document.querySelectorAll(".filter-btn").forEach(b=>b.onclick=()=>{filter=b.dataset.f;renderFilter();renderTable();});
}
function renderTable(){
  const rows=items().filter(i=>filter==="all"||i.voucherType===filter);
  const head=`<thead><tr><th>序号</th><th>类目</th><th>说明（用途）</th><th>备注（商户）</th><th>日期</th><th>金额（元）</th><th>凭证</th><th>发票</th></tr></thead>`;
  const body="<tbody>"+rows.map(it=>`<tr class="${it.voucherType==="none"?"row-none":""} ${isPersonal(it)?"personal":""}"><td>${it.id}</td><td>${esc(it.category)}</td><td>${esc(it.description||"-")}</td><td>${esc(it.remark||"")||'<span class="muted">—</span>'}</td><td>${esc(it.date)}</td><td class="amount-cell">${fmt(it.amount)}</td><td>${badge(it.voucherType)}</td><td>${dl(it)}</td></tr>`).join("")+"</tbody>";
  const tot=rows.reduce((s,i)=>s+i.amount,0);
  const foot=`<tfoot><tr><td colspan="4">${filter==="all"?"合计":"当前视图合计"}（${rows.length}笔）</td><td></td><td class="amount-cell">${fmt(tot)} 元</td><td colspan="2"></td></tr></tfoot>`;
  document.getElementById("expense-table").innerHTML=head+body+foot;
}
function renderCat(){
  const opts=["交通费","差旅-交通","住宿费","餐费","汽车费用","快递费","办公用品","器材","业务招待费","其他"];
  const its=items();const seen=new Set();const order=[];
  opts.forEach(c=>{seen.add(c);order.push(c);});
  its.forEach(i=>{if(!seen.has(i.category)){seen.add(i.category);order.push(i.category);}});
  const rows=order.map(c=>{const g=its.filter(i=>i.category===c);return g.length?[c,g.length,g.reduce((s,i)=>s+i.amount,0)]:null;}).filter(Boolean);
  document.getElementById("category-tbody").innerHTML=rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${r[1]}</td><td class="amount-cell">${fmt(r[2])}</td></tr>`).join("");
  document.getElementById("category-total-cell").textContent=fmt(rows.reduce((s,r)=>s+r[2],0))+" 元";
}
function renderInvList(){
  const inv=rep().invoices||[];const box=document.getElementById("invoice-list");
  if(!inv.length){box.innerHTML="";return;}
  const rows=inv.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(v=>`<tr><td>${esc(v.date||"-")}</td><td>${esc(v.merchant||"-")}</td><td>${esc(v.kind||"-")}</td><td class="amount-cell">${v.amount!=null?fmt(v.amount):"-"}</td><td><a class="btn" href="${esc(v.file)}" download target="_blank" rel="noopener">下载</a></td></tr>`).join("");
  box.innerHTML=`<h2>发票清单（已托管 ${inv.length} 张）</h2><p class="muted" style="margin-top:-6px;font-size:13px;">全部已上传发票，可对照日期/商户/金额人工挂到上表。</p><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>商户</th><th>类型</th><th>金额（元）</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderAll(){renderTabs();renderCards();renderFilter();renderTable();renderCat();renderInvList();}
renderAll();
</script></body></html>
