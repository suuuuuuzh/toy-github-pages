<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报销单 · 堪景贵州山东</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1 id="report-title">报销单</h1>
      <div class="meta" id="report-meta"></div>
      <div class="meta" style="margin-top:6px"><span>填报日期：<b id="report-date"></b></span><span><a href="index.html">← 返回</a></span></div>
      <h2 style="margin:14px 0 0;font-size:18px;">费用报销明细</h2>
    </header>

    <section class="summary-cards" id="summary-cards"></section>
    <div id="download-all" style="margin:0 0 20px;"></div>

    <section>
      <div class="section-head">
        <h2>明细</h2>
        <div class="section-actions">
          <div id="filter-bar" class="filter-bar"></div>
          <button id="add-row-btn" class="btn-outline">＋添加一笔</button>
          <button id="merge-btn" class="btn-outline" disabled>合并所选（0）</button>
          <button id="attach-export-btn" class="btn-outline">导出发票挂载</button>
          <button id="export-btn" class="btn-outline">导出 data.js（含备注）</button>
        </div>
      </div>
      <p class="muted" style="font-size:12px;margin:0 0 10px;">每笔右侧点「＋挂发票」从已托管发票里选（可挂多张，弹窗默认按这笔金额预筛）；挂好会自动存本浏览器。备注格子可写用途。改完点「导出发票挂载」把挂载结果发我，我永久写进文件。</p>
      <div style="overflow-x:auto;">
        <table id="expense-table"></table>
      </div>
    </section>

    <section>
      <h2>费用类目汇总（点类目展开明细）</h2>
      <div id="category-accordion"></div>
    </section>

    <section>
      <h2>抵票汇总</h2>
      <p class="muted" style="margin-top:-6px;font-size:13px;">没有发票的费用，用别的发票/收据来抵（抵票）。一张抵票可以抵好几笔费用，一笔费用也可能要凑好几张抵票才够，这里按抵票编号列出每张抵票自己的面值、发票类型、关联了哪几笔费用，方便财务核对。</p>
      <table id="tpiao-table">
        <thead>
          <tr>
            <th>抵票编号</th>
            <th>发票类型</th>
            <th>关联序号</th>
            <th>涉及项目</th>
            <th>抵票金额（元）</th>
            <th>凭证</th>
          </tr>
        </thead>
        <tbody id="tpiao-tbody"></tbody>
        <tfoot>
          <tr>
            <td colspan="4">合计</td>
            <td class="amount-cell" id="tpiao-total-cell"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <p class="empty-hint" id="tpiao-empty" style="display: none">本次报销无抵票项目。</p>
    </section>

    <section id="invoice-list-section"></section>
  </div>

  <script src="data-kanjing.js"></script>
  <script src="invoices-kanjing.js"></script>
  <script src="app.js"></script>
</body>
</html>
