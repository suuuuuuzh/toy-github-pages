<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报销单 · 上海杭州</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1 id="report-title">报销单</h1>
      <div class="meta">
        <span>报销人：<b id="submitter"></b></span>
        <span>部门：<b id="department"></b></span>
        <span>报销周期：<b id="period"></b></span>
        <span>填报日期：<b id="report-date"></b></span>
        <span><a href="index.html">← 返回</a></span>
      </div>
    </header>

    <section class="summary-cards" id="summary-cards"></section>
    <div id="download-all" style="margin:0 0 20px;"></div>

    <section>
      <div class="section-head">
        <h2>报销明细</h2>
        <div class="section-actions">
          <div id="filter-bar" class="filter-bar"></div>
          <button id="attach-export-btn" class="btn-outline">导出发票挂载</button>
          <button id="export-btn" class="btn-outline">导出 data.js（含备注）</button>
        </div>
      </div>
      <p class="muted" style="font-size:12px;margin:0 0 10px;">「说明」和「备注」都可直接点格子编辑；每笔右侧点「＋挂发票」从库里选或本地上传；改完点「导出发票挂载」把结果发我永久保存。</p>
      <div style="overflow-x:auto;">
        <table id="expense-table"></table>
      </div>
    </section>

    <section>
      <h2>费用类目汇总</h2>
      <table id="category-table">
        <thead>
          <tr>
            <th>类目</th>
            <th>笔数</th>
            <th>金额合计（元）</th>
          </tr>
        </thead>
        <tbody id="category-tbody"></tbody>
        <tfoot>
          <tr>
            <td>合计</td>
            <td></td>
            <td class="amount-cell" id="category-total-cell"></td>
          </tr>
        </tfoot>
      </table>
    </section>

    <section>
      <h2>替票汇总</h2>
      <p class="muted" style="margin-top:-6px;font-size:13px;">没有发票的费用，用别的发票/收据来抵（替票）。一张替票可以抵好几笔费用，一笔费用也可能要凑好几张替票才够，这里按替票编号列出每张替票自己的面值、发票类型、关联了哪几笔费用，方便财务核对。</p>
      <table id="tpiao-table">
        <thead>
          <tr>
            <th>替票编号</th>
            <th>发票类型</th>
            <th>关联序号</th>
            <th>涉及项目</th>
            <th>替票金额（元）</th>
            <th>凭证</th>
          </tr>
        </thead>
        <tbody id="tpiao-tbody"></tbody>
        <tfoot>
          <tr>
            <td colspan="4">合计</td>
            <td class="amount-cell" id="tpiao-total-cell"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <p class="empty-hint" id="tpiao-empty" style="display: none">本次报销无 T 票项目。</p>
    </section>

    <section id="invoice-list-section"></section>
  </div>

  <script src="data-shanghai.js"></script>
  <script src="invoices-shanghai.js"></script>
  <script src="app.js"></script>
</body>
</html>
